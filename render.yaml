services:
  - type: web
    name: discord-bot
    runtime: node
    region: oregon
    plan: free

    buildCommand: "pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build"
    startCommand: "node --enable-source-maps ./artifacts/api-server/dist/index.mjs"

    healthCheckPath: /api/healthz

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        fromService:
          type: web
          name: discord-bot
          property: port
      - key: DISCORD_BOT_TOKEN
        sync: false          # Render will prompt you to fill this in the dashboard
      - key: SESSION_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
